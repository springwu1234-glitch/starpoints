<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="集點星球">
<meta name="theme-color" content="#302b63">
<title>集點星球</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#1a1a2e;font-family:'Nunito',sans-serif}
  #root{height:100%;display:flex;justify-content:center;align-items:center}
  ::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const LEVELS = [
  { level:1, name:"星星蛋", emoji:"🥚", min:0,   max:99,       color:"#FFE135", bg:"#FFF9E6" },
  { level:2, name:"小光球", emoji:"✨", min:100,  max:299,      color:"#FFB347", bg:"#FFF4E6" },
  { level:3, name:"彩蝶",   emoji:"🦋", min:300,  max:599,      color:"#FF61A6", bg:"#FFE6F4" },
  { level:4, name:"星光獸", emoji:"🦄", min:600,  max:999,      color:"#A78BFA", bg:"#F0EBFF" },
  { level:5, name:"神龍",   emoji:"🐉", min:1000, max:Infinity, color:"#34D399", bg:"#E6FFF5" },
];
const getLevel = pts => LEVELS.find(l => pts >= l.min && pts <= l.max) || LEVELS[0];

const INIT_EVENTS = [
  {id:1,name:"完成作業",    points:5,  emoji:"📚",type:"add"},
  {id:2,name:"主動幫忙家事",points:10, emoji:"🧹",type:"add"},
  {id:3,name:"準時起床",    points:3,  emoji:"⏰",type:"add"},
  {id:4,name:"主動練琴",    points:8,  emoji:"🎹",type:"add"},
  {id:5,name:"忘記收書包",  points:-3, emoji:"😅",type:"deduct"},
  {id:6,name:"頂嘴",        points:-5, emoji:"🙅",type:"deduct"},
];
const INIT_REWARDS = [
  {id:1,name:"看30分鐘YouTube",cost:20,emoji:"📺"},
  {id:2,name:"買一個小玩具",    cost:50,emoji:"🎁"},
  {id:3,name:"選今晚晚餐",      cost:30,emoji:"🍜"},
  {id:4,name:"免一次洗碗",      cost:15,emoji:"🍽️"},
];
const INIT_HISTORY = [
  {id:1,event:"完成作業",    points:5,  emoji:"📚",time:"今天 18:30",message:"今天數學考100分！超棒的！"},
  {id:2,event:"主動幫忙家事",points:10, emoji:"🧹",time:"今天 12:00",message:""},
  {id:3,event:"頂嘴",        points:-5, emoji:"🙅",time:"昨天 20:15",message:"下次說話要注意語氣喔"},
  {id:4,event:"準時起床",    points:3,  emoji:"⏰",time:"昨天 07:00",message:"太棒了，連續3天準時！"},
];

function App() {
  const [mode,setMode]=useState("select");
  const [points,setPoints]=useState(87);
  const [events,setEvents]=useState(INIT_EVENTS);
  const [rewards,setRewards]=useState(INIT_REWARDS);
  const [history,setHistory]=useState(INIT_HISTORY);
  const [parentTab,setParentTab]=useState("actions");
  const [kidTab,setKidTab]=useState("home");
  const [floatAnim,setFloatAnim]=useState(null);
  const [levelUpAnim,setLevelUpAnim]=useState(false);
  const [redeemMsg,setRedeemMsg]=useState(null);
  const [showAddEvent,setShowAddEvent]=useState(false);
  const [editingEvent,setEditingEvent]=useState(null); // event being edited
  const [newEvent,setNewEvent]=useState({name:"",points:"",emoji:"⭐",type:"add"});
  const [showAddReward,setShowAddReward]=useState(false);
  const [editingReward,setEditingReward]=useState(null);
  const [newReward,setNewReward]=useState({name:"",cost:"",emoji:"🎁"});
  const [pinInput,setPinInput]=useState("");
  const [pinError,setPinError]=useState(false);
  const [PIN,setPIN]=useState("1234");
  const [kidName,setKidName]=useState("小寶");

  const addPoints = ev => {
    const prev=getLevel(points);
    const np=Math.max(0,points+ev.points);
    const nl=getLevel(np);
    setPoints(np);
    setFloatAnim({val:ev.points,id:Date.now()});
    setTimeout(()=>setFloatAnim(null),1200);
    if(nl.level>prev.level){setTimeout(()=>{setLevelUpAnim(true);setTimeout(()=>setLevelUpAnim(false),2000)},300);}
    setHistory(h=>[{id:Date.now(),event:ev.name,points:ev.points,emoji:ev.emoji,time:"剛剛",message:""},...h]);
  };

  const redeem = r => {
    if(points<r.cost){setRedeemMsg({text:"點數不足 😢",ok:false});}
    else{
      setPoints(p=>p-r.cost);
      setRedeemMsg({text:`已兌換「${r.name}」🎉`,ok:true});
      setHistory(h=>[{id:Date.now(),event:`兌換：${r.name}`,points:-r.cost,emoji:r.emoji,time:"剛剛",message:""},...h]);
    }
    setTimeout(()=>setRedeemMsg(null),2000);
  };

  const handleLogin = () => {
    if(pinInput===PIN){setPinInput("");setPinError(false);setMode("parent");}
    else{setPinError(true);setTimeout(()=>setPinError(false),1000);}
  };

  const openEditEvent = (ev) => {
    setEditingEvent(ev);
    setNewEvent({name:ev.name, points:String(ev.points), emoji:ev.emoji, type:ev.type});
    setShowAddEvent(true);
  };
  const deleteEvent = (id) => setEvents(ev=>ev.filter(e=>e.id!==id));

  const openEditReward = (r) => {
    setEditingReward(r);
    setNewReward({name:r.name, cost:String(r.cost), emoji:r.emoji});
    setShowAddReward(true);
  };
  const deleteReward = (id) => setRewards(r=>r.filter(x=>x.id!==id));

  const lv=getLevel(points);
  const nextLv=LEVELS.find(l=>l.level===lv.level+1);
  const progress=nextLv?((points-lv.min)/(nextLv.min-lv.min))*100:100;

  const isPhone = window.innerWidth <= 430;
  const wrapStyle = isPhone
    ? {width:"100%",height:"100%",borderRadius:0}
    : {width:390,height:780,borderRadius:48,boxShadow:"0 40px 100px rgba(0,0,0,0.6)"};

  return (
    <div style={{...wrapStyle,background:"#fff",overflow:"hidden",position:"relative"}}>
      {!isPhone && <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:120,height:28,background:"#1a1a2e",borderRadius:"0 0 20px 20px",zIndex:100}}/>}
      <div style={{width:"100%",height:"100%",overflow:"hidden",position:"relative"}}>
        {mode==="select" && <ModeSelect setMode={setMode} pinInput={pinInput} setPinInput={setPinInput} handleLogin={handleLogin} pinError={pinError} kidName={kidName}/>}
        {mode==="parent" && <ParentMode points={points} lv={lv} events={events} rewards={rewards} history={history} addPoints={addPoints} tab={parentTab} setTab={setParentTab} setMode={setMode} floatAnim={floatAnim} showAddEvent={showAddEvent} setShowAddEvent={setShowAddEvent} editingEvent={editingEvent} setEditingEvent={setEditingEvent} newEvent={newEvent} setNewEvent={setNewEvent} setEvents={setEvents} openEditEvent={openEditEvent} deleteEvent={deleteEvent} showAddReward={showAddReward} setShowAddReward={setShowAddReward} editingReward={editingReward} setEditingReward={setEditingReward} newReward={newReward} setNewReward={setNewReward} setRewards={setRewards} openEditReward={openEditReward} deleteReward={deleteReward} PIN={PIN} setPIN={setPIN} kidName={kidName} setKidName={setKidName}/>}
        {mode==="kid" && <KidMode points={points} lv={lv} nextLv={nextLv} progress={progress} rewards={rewards} history={history} redeem={redeem} tab={kidTab} setTab={setKidTab} setMode={setMode} redeemMsg={redeemMsg} levelUpAnim={levelUpAnim} kidName={kidName}/>}
      </div>
    </div>
  );
}

function ModeSelect({setMode,pinInput,setPinInput,handleLogin,pinError,kidName}){
  const [showPin,setShowPin]=useState(false);
  return (
    <div style={{height:"100%",background:"linear-gradient(160deg,#0f0c29,#302b63,#24243e)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:20,position:"relative",overflow:"hidden"}}>
      <div style={{fontSize:56,animation:"float 3s ease-in-out infinite"}}>⭐</div>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:"#fff",letterSpacing:2}}>集點星球</div>
      <div style={{fontSize:14,color:"rgba(255,255,255,0.6)",marginBottom:24}}>選擇你的角色</div>
      <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%"}}>
        <button onClick={()=>setShowPin(true)} style={{border:"none",borderRadius:20,padding:"18px 20px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",background:"linear-gradient(135deg,#f093fb,#f5576c)",boxShadow:"0 8px 24px rgba(240,147,251,0.4)"}}>
          <span style={{fontSize:32}}>👩‍👧</span>
          <span style={{fontFamily:"'Fredoka One',cursive",fontSize:20,color:"#fff",flex:1,textAlign:"left"}}>家長模式</span>
          <span style={{fontSize:12,color:"rgba(255,255,255,0.8)"}}>管理點數與獎勵</span>
          <span style={{fontSize:18}}>🔒</span>
        </button>
        <button onClick={()=>setMode("kid")} style={{border:"none",borderRadius:20,padding:"18px 20px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",background:"linear-gradient(135deg,#4facfe,#00f2fe)",boxShadow:"0 8px 24px rgba(79,172,254,0.4)"}}>
          <span style={{fontSize:32}}>🧒</span>
          <span style={{fontFamily:"'Fredoka One',cursive",fontSize:20,color:"#fff",flex:1,textAlign:"left"}}>{kidName}模式</span>
          <span style={{fontSize:12,color:"rgba(255,255,255,0.8)"}}>查看點數和寵物</span>
          <span style={{fontSize:18}}>→</span>
        </button>
      </div>
      {showPin&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,backdropFilter:"blur(4px)"}}>
          <div style={{background:"#fff",borderRadius:24,padding:"28px 24px",width:280,textAlign:"center",animation:pinError?"shake 0.4s ease":"none"}}>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:20,color:"#333",marginBottom:4}}>🔐 輸入家長密碼</div>
            <div style={{fontSize:12,color:"#aaa",marginBottom:16}}>（預設：1234）</div>
            <input type="password" maxLength={4} placeholder="••••" value={pinInput} onChange={e=>setPinInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} autoFocus style={{width:"100%",border:`2px solid ${pinError?"#f5576c":"#e0e0e0"}`,borderRadius:12,padding:12,fontSize:24,textAlign:"center",letterSpacing:8,outline:"none",fontFamily:"'Nunito',sans-serif"}}/>
            {pinError&&<div style={{color:"#f5576c",fontSize:13,marginTop:8}}>密碼錯誤，請再試一次</div>}
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button onClick={()=>{setShowPin(false);setPinInput("");}} style={{flex:1,padding:12,border:"2px solid #eee",borderRadius:12,background:"none",color:"#666",fontSize:15,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>取消</button>
              <button onClick={handleLogin} style={{flex:1,padding:12,border:"none",borderRadius:12,background:"linear-gradient(135deg,#f093fb,#f5576c)",color:"#fff",fontSize:15,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>確認</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ParentMode({points,lv,events,rewards,history,addPoints,tab,setTab,setMode,floatAnim,showAddEvent,setShowAddEvent,editingEvent,setEditingEvent,newEvent,setNewEvent,setEvents,openEditEvent,deleteEvent,showAddReward,setShowAddReward,editingReward,setEditingReward,newReward,setNewReward,setRewards,openEditReward,deleteReward,PIN,setPIN,kidName,setKidName}){
  return(
    <div style={{height:"100%",background:"#F8F7FF",display:"flex",flexDirection:"column",paddingTop:32}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px 8px"}}>
        <div><div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:"#333"}}>集點星球</div><div style={{fontSize:11,color:"#999"}}>家長管理介面</div></div>
        <button onClick={()=>setMode("select")} style={{background:"#EEE",border:"none",borderRadius:20,padding:"6px 14px",fontSize:13,color:"#666",cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>切換 ↩</button>
      </div>
      <div style={{margin:"8px 20px",background:"linear-gradient(135deg,#667eea,#764ba2)",borderRadius:20,padding:"16px 20px",display:"flex",alignItems:"center",gap:14,position:"relative"}}>
        <div style={{fontSize:36}}>{lv.emoji}</div>
        <div style={{flex:1}}><div style={{fontFamily:"'Fredoka One',cursive",fontSize:20,color:"#fff"}}>{kidName}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginTop:2}}>{lv.name} · Lv.{lv.level}</div></div>
        <div style={{position:"relative",textAlign:"right"}}>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:40,color:"#FFE135",lineHeight:1}}>{points}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}>點</div>
          {floatAnim&&<div key={floatAnim.id} style={{position:"absolute",top:-20,right:0,fontFamily:"'Fredoka One',cursive",fontSize:22,color:floatAnim.val>0?"#4ade80":"#f87171",animation:"floatUp 1.2s ease forwards",pointerEvents:"none"}}>{floatAnim.val>0?`+${floatAnim.val}`:floatAnim.val}</div>}
        </div>
      </div>
      <div style={{display:"flex",margin:"12px 20px 0",background:"#eee",borderRadius:14,padding:4,gap:2}}>
        {[["actions","快速加點"],["rewards","兌換管理"],["history","記錄"],["settings","設定"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 4px",border:"none",borderRadius:10,background:tab===k?"#fff":"transparent",fontSize:12,color:tab===k?"#333":"#888",cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700,boxShadow:tab===k?"0 2px 8px rgba(0,0,0,0.1)":"none",transition:"all 0.2s"}}>{l}</button>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 20px 20px"}}>
        {tab==="actions"&&(
          <div>
            <div style={{fontSize:12,fontWeight:800,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>加點事件</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {events.filter(e=>e.type==="add").map(e=>(
                <div key={e.id} style={{position:"relative",borderRadius:14,background:"linear-gradient(135deg,#d4fc79,#96e6a1)",boxShadow:"0 4px 12px rgba(150,230,161,0.4)"}}>
                  <button onClick={()=>addPoints(e)} style={{border:"none",borderRadius:14,padding:"12px 12px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",background:"transparent",width:"100%"}}>
                    <span style={{fontSize:24}}>{e.emoji}</span>
                    <span style={{fontSize:12,fontWeight:700,color:"#333",textAlign:"center"}}>{e.name}</span>
                    <span style={{fontFamily:"'Fredoka One',cursive",fontSize:16,color:"#333"}}>+{e.points}</span>
                  </button>
                  <div style={{display:"flex",justifyContent:"center",gap:6,padding:"0 8px 8px"}}>
                    <button onClick={()=>openEditEvent(e)} style={{flex:1,border:"none",borderRadius:8,background:"rgba(255,255,255,0.6)",fontSize:11,color:"#555",cursor:"pointer",padding:"4px 0",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>✏️ 編輯</button>
                    <button onClick={()=>deleteEvent(e.id)} style={{flex:1,border:"none",borderRadius:8,background:"rgba(255,100,100,0.15)",fontSize:11,color:"#d00",cursor:"pointer",padding:"4px 0",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>🗑️ 刪除</button>
                  </div>
                </div>
              ))}
            </div>
            <div style={{fontSize:12,fontWeight:800,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:8,marginTop:12}}>扣點事件</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {events.filter(e=>e.type==="deduct").map(e=>(
                <div key={e.id} style={{position:"relative",borderRadius:14,background:"linear-gradient(135deg,#ffecd2,#fcb69f)",boxShadow:"0 4px 12px rgba(252,182,159,0.4)"}}>
                  <button onClick={()=>addPoints(e)} style={{border:"none",borderRadius:14,padding:"12px 12px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",background:"transparent",width:"100%"}}>
                    <span style={{fontSize:24}}>{e.emoji}</span>
                    <span style={{fontSize:12,fontWeight:700,color:"#333",textAlign:"center"}}>{e.name}</span>
                    <span style={{fontFamily:"'Fredoka One',cursive",fontSize:16,color:"#333"}}>{e.points}</span>
                  </button>
                  <div style={{display:"flex",justifyContent:"center",gap:6,padding:"0 8px 8px"}}>
                    <button onClick={()=>openEditEvent(e)} style={{flex:1,border:"none",borderRadius:8,background:"rgba(255,255,255,0.6)",fontSize:11,color:"#555",cursor:"pointer",padding:"4px 0",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>✏️ 編輯</button>
                    <button onClick={()=>deleteEvent(e.id)} style={{flex:1,border:"none",borderRadius:8,background:"rgba(255,100,100,0.15)",fontSize:11,color:"#d00",cursor:"pointer",padding:"4px 0",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>🗑️ 刪除</button>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={()=>{setEditingEvent(null);setNewEvent({name:"",points:"",emoji:"⭐",type:"add"});setShowAddEvent(true);}} style={{width:"100%",marginTop:12,padding:12,border:"2px dashed #ccc",borderRadius:14,background:"none",color:"#aaa",fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>＋ 新增自訂事件</button>
          </div>
        )}
        {tab==="rewards"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{fontSize:12,fontWeight:800,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>可兌換獎勵</div>
            {rewards.map(r=>(
              <div key={r.id} style={{background:"#fff",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                <span style={{fontSize:24}}>{r.emoji}</span>
                <span style={{flex:1,fontSize:14,fontWeight:700,color:"#333"}}>{r.name}</span>
                <span style={{fontFamily:"'Fredoka One',cursive",fontSize:15,color:"#667eea",marginRight:8}}>{r.cost}點</span>
                <button onClick={()=>openEditReward(r)} style={{border:"none",borderRadius:8,background:"#f0f0f0",fontSize:12,color:"#555",cursor:"pointer",padding:"5px 8px",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>✏️</button>
                <button onClick={()=>deleteReward(r.id)} style={{border:"none",borderRadius:8,background:"rgba(255,100,100,0.1)",fontSize:12,color:"#d00",cursor:"pointer",padding:"5px 8px",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>🗑️</button>
              </div>
            ))}
            <button onClick={()=>{setEditingReward(null);setNewReward({name:"",cost:"",emoji:"🎁"});setShowAddReward(true);}} style={{width:"100%",marginTop:4,padding:12,border:"2px dashed #ccc",borderRadius:14,background:"none",color:"#aaa",fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>＋ 新增獎勵</button>
          </div>
        )}
        {tab==="history"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {history.map(h=>(
              <div key={h.id} style={{background:"#fff",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"flex-start",gap:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                <span style={{fontSize:24,marginTop:2}}>{h.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#333"}}>{h.event}</div>
                  {h.message&&<div style={{fontSize:12,color:"#888",marginTop:2}}>💬 {h.message}</div>}
                  <div style={{fontSize:11,color:"#bbb",marginTop:2}}>{h.time}</div>
                </div>
                <span style={{fontFamily:"'Fredoka One',cursive",fontSize:18,color:h.points>0?"#4ade80":"#f87171"}}>{h.points>0?`+${h.points}`:h.points}</span>
              </div>
            ))}
          </div>
        )}
        {tab==="settings"&&<SettingsTab PIN={PIN} setPIN={setPIN} kidName={kidName} setKidName={setKidName}/>}
      </div>
      {showAddEvent&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:50,backdropFilter:"blur(2px)"}}>
          <div style={{background:"#fff",borderRadius:"28px 28px 0 0",padding:"24px 20px 36px",width:"100%",maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:"#333",marginBottom:16}}>{editingEvent?"編輯事件":"新增自訂事件"}</div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:800,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>名稱</div>

                  <button key={e} onClick={()=>setNewReward(n=>({...n,emoji:e}))} style={{width:38,height:38,border:`2px solid ${newReward.emoji===e?"#764ba2":"transparent"}`,borderRadius:10,background:newReward.emoji===e?"#f0ebff":"#f5f5f5",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{e}</button>

              <button onClick={()=>{
                if(!newReward.name||!newReward.cost)return;
                const cost=parseInt(newReward.cost);

                } else {
                  setRewards(rv=>[...rv,{id:Date.now(),name:newReward.name,cost,emoji:newReward.emoji||"🎁"}]);

function PinDots({val,maxLen=4}){
  return (
    <div style={{display:"flex",gap:12,justifyContent:"center",margin:"16px 0"}}>
      {Array.from({length:maxLen}).map((_,i)=>(
        <div key={i} style={{width:16,height:16,borderRadius:"50%",background:i<val.length?"#764ba2":"#eee",transition:"background 0.15s"}}/>
      ))}
    </div>
  );
}
function NumPad({val,setVal,maxLen=4,onConfirm,onCancel,err,confirmLabel="確認"}){
  const keys=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  return (
    <div>
      <PinDots val={val} maxLen={maxLen}/>
      {err&&<div style={{color:"#f5576c",fontSize:13,textAlign:"center",marginBottom:8}}>{err}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,margin:"8px 0 16px"}}>
        {keys.map((k,i)=>(
          k===""?<div key={i}/>:
          <button key={i} onClick={()=>{
            if(k==="⌫"){setVal(v=>v.slice(0,-1));}
            else if(val.length<maxLen){setVal(v=>v+k);}
          }} style={{padding:"14px 0",border:"2px solid #eee",borderRadius:14,background:k==="⌫"?"#fff5f5":"#fff",fontSize:k==="⌫"?20:22,fontWeight:700,cursor:"pointer",color:k==="⌫"?"#f87171":"#333",fontFamily:"'Nunito',sans-serif"}}>
            {k}
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onCancel} style={{flex:1,padding:14,border:"2px solid #eee",borderRadius:14,background:"none",color:"#666",fontSize:15,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>取消</button>
        <button onClick={onConfirm} style={{flex:1,padding:14,border:"none",borderRadius:14,background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",fontSize:15,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>{confirmLabel}</button>
      </div>
    </div>
  );
}
function SettingsTab({PIN,setPIN,kidName,setKidName}){
  const [step,setStep]=useState("menu");
  const [oldPin,setOldPin]=useState("");
  const [newPin,setNewPin]=useState("");
  const [confirmPin,setConfirmPin]=useState("");
  const [err,setErr]=useState("");
  const [nameInput,setNameInput]=useState(kidName);
  const labelStyle={fontSize:12,fontWeight:800,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:8,display:"block"};

  if(step==="menu") return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{fontSize:12,fontWeight:800,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>一般設定</div>
      <div style={{background:"#fff",borderRadius:16,padding:"18px 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:13,color:"#999",marginBottom:4}}>孩子名稱</div>
        <div style={{fontSize:18,fontWeight:800,color:"#333"}}>{kidName}</div>
        <button onClick={()=>{setNameInput(kidName);setStep("changeName");}} style={{marginTop:10,border:"none",borderRadius:10,background:"#f0ebff",color:"#764ba2",fontSize:13,fontWeight:700,padding:"6px 14px",cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>✏️ 修改名稱</button>
      </div>
      <div style={{fontSize:12,fontWeight:800,color:"#888",textTransform:"uppercase",letterSpacing:1,marginTop:4,marginBottom:4}}>安全設定</div>
      <div style={{background:"#fff",borderRadius:16,padding:"18px 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:13,color:"#999",marginBottom:4}}>家長密碼</div>
        <div style={{fontSize:22,fontWeight:800,color:"#333",letterSpacing:8}}>{"●".repeat(PIN.length)}</div>
        <button onClick={()=>{setOldPin("");setErr("");setStep("verifyOld");}} style={{marginTop:10,border:"none",borderRadius:10,background:"#f0ebff",color:"#764ba2",fontSize:13,fontWeight:700,padding:"6px 14px",cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>🔑 變更密碼</button>
      </div>
    </div>
  );

  if(step==="changeName") return (
    <div style={{background:"#fff",borderRadius:16,padding:"20px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:18,color:"#333",marginBottom:16}}>修改孩子名稱</div>
      <span style={labelStyle}>顯示名稱</span>
      <input value={nameInput} onChange={e=>setNameInput(e.target.value)} placeholder="輸入新名稱" style={{width:"100%",border:"2px solid #eee",borderRadius:12,padding:12,fontSize:18,fontFamily:"'Nunito',sans-serif",outline:"none",textAlign:"center"}}/>
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <button onClick={()=>setStep("menu")} style={{flex:1,padding:13,border:"2px solid #eee",borderRadius:12,background:"none",color:"#666",fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>取消</button>
        <button onClick={()=>{if(nameInput.trim()){setKidName(nameInput.trim());setStep("menu");}}} style={{flex:1,padding:13,border:"none",borderRadius:12,background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>儲存</button>
      </div>
    </div>
  );

  if(step==="verifyOld") return (
    <div style={{background:"#fff",borderRadius:16,padding:"20px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:18,color:"#333",marginBottom:4}}>🔐 輸入目前密碼</div>
      <div style={{fontSize:12,color:"#aaa",marginBottom:4}}>請輸入現在的家長密碼</div>
      <NumPad val={oldPin} setVal={setOldPin} maxLen={PIN.length>4?PIN.length:6} err={err} confirmLabel="下一步"
        onConfirm={()=>{if(oldPin===PIN){setErr("");setNewPin("");setConfirmPin("");setStep("setNew");}else{setErr("密碼錯誤，請再試一次");setOldPin("");}}}
        onCancel={()=>{setStep("menu");setOldPin("");setErr("");}}/>
    </div>
  );

  if(step==="setNew") return (
    <div style={{background:"#fff",borderRadius:16,padding:"20px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:18,color:"#333",marginBottom:4}}>
        {confirmPin.length===0&&newPin.length<4?"設定新密碼":"確認新密碼"}
      </div>
      <div style={{fontSize:12,color:"#aaa",marginBottom:4}}>
        {newPin.length<4?"請輸入4位新密碼":"請再輸入一次確認"}
      </div>
      {newPin.length<4
        ? <NumPad val={newPin} setVal={setNewPin} err={err} confirmLabel="下一步"
            onConfirm={()=>{if(newPin.length<4){setErr("至少需要4位數");}else{setErr("");}}}
            onCancel={()=>{setStep("menu");setNewPin("");setErr("");}}/>
        : <NumPad val={confirmPin} setVal={setConfirmPin} err={err} confirmLabel="儲存密碼"
            onConfirm={()=>{
              if(confirmPin!==newPin){setErr("兩次密碼不一致");setConfirmPin("");}
              else{setPIN(newPin);setStep("done");}
            }}
            onCancel={()=>{setNewPin("");setConfirmPin("");setErr("");}}/>
      }
    </div>
  );

  if(step==="done") return (
    <div style={{background:"#fff",borderRadius:16,padding:"32px 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",textAlign:"center"}}>
      <div style={{fontSize:56}}>✅</div>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:"#333",marginTop:12}}>密碼已更新！</div>
      <div style={{fontSize:13,color:"#999",marginTop:8}}>新密碼已生效，下次進入家長模式時使用新密碼。</div>
      <button onClick={()=>setStep("menu")} style={{width:"100%",padding:14,border:"none",borderRadius:14,background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",fontSize:15,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700,marginTop:24}}>返回設定</button>
    </div>
  );
}

                <div style={{fontFamily:"'Fredoka One',cursive",fontSize:16,color:"#FFE135",marginBottom:10}}>{r.cost} 點</div>
                <button onClick={()=>redeem(r)} disabled={points<r.cost} style={{width:"100%",padding:8,border:"none",borderRadius:10,background:points<r.cost?"rgba(255,255,255,0.1)":"linear-gradient(135deg,#4facfe,#00f2fe)",color:points<r.cost?"rgba(255,255,255,0.5)":"#fff",fontSize:12,fontWeight:800,cursor:points<r.cost?"not-allowed":"pointer",fontFamily:"'Nunito',sans-serif"}}>
                  {points<r.cost?`差 ${r.cost-points} 點`:"兌換！"}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
      {tab==="log"&&(
        <div style={{flex:1,overflowY:"auto",padding:"0 20px 20px",display:"flex",flexDirection:"column",gap:8}}>
          {history.map(h=>(
            <div key={h.id} style={{background:"rgba(255,255,255,0.08)",borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"flex-start",gap:12,backdropFilter:"blur(10px)"}}>
              <div style={{fontSize:24,marginTop:2}}>{h.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{h.event}</div>
                {h.message&&<div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginTop:2}}>💬 {h.message}</div>}
                <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{h.time}</div>
              </div>
              <div style={{fontFamily:"'Fredoka One',cursive",fontSize:20,color:h.points>0?"#4ade80":"#f87171"}}>{h.points>0?`+${h.points}`:h.points}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
<style>
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
  @keyframes levelUp{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));
  }
</script>
</body>
</html>
